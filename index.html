<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flower Shop</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
    <nav class="navbar navbar-expand-lg bg-white py-3 shadow-sm">
        <div class="container">
      
          <a class="navbar-brand fw-bold" href="#">
            FlowerShop
          </a>
      
          <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
          </button>
      
          <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav mx-auto">
              <li class="nav-item">
                <a class="nav-link" href="#">Home</a>
              </li>
      
              <li class="nav-item">
                <a class="nav-link" href="#">Shop</a>
              </li>
      
              <li class="nav-item">
                <a class="nav-link" href="#">Blog</a>
              </li>
      
              <li class="nav-item">
                <a class="nav-link" href="#">Contact</a>
              </li>
            </ul>
      
            <button class="btn btn-danger rounded-pill px-4">
              Shop Now
            </button>
      
          </div>
        </div>
      </nav>



      <section class="hero-section">
        <div class="container">
          <div class="row align-items-center min-vh-100">
      
            <div class="col-lg-6">
              <h1 class="display-3 fw-bold">
                Beautiful Flowers For Every Occasion
              </h1>
      
              <p class="lead my-4">
                Fresh flowers delivered directly to your doorstep.
              </p>
      
              <button class="btn btn-danger btn-lg rounded-pill px-5">
                Shop Collection
              </button>
            </div>
      
            <div class="col-lg-6 text-center">
              <img src="images/hero.jpg" class="img-fluid" alt="">
            </div>
      
          </div>
        </div>
      </section>



      <section class="py-5">
        <div class="container">
      
          <div class="text-center mb-5">
            <h2 class="fw-bold">New Products</h2>
            <p>Fresh flowers for your loved ones</p>
          </div>
      
          <div class="row g-4">
      
            <div class="col-lg-3 col-md-6">
              <div class="card border-0 shadow-sm">
      
                <img src="images/flower1.jpg" class="card-img-top">
      
                <div class="card-body text-center">
                  <h5>Pink Rose</h5>
                  <p class="text-danger fw-bold">$25</p>
                </div>
      
              </div>
            </div>

            <div class="col-lg-3 col-md-6">
                <div class="card border-0 shadow-sm">
        
                  <img src="images/Flower2.jpg" class="card-img-top">
        
                  <div class="card-body text-center">
                    <h5>Red Rose</h5>
                    <p class="text-danger fw-bold">$25</p>
                  </div>
        
                </div>
              </div>
      
          </div>
      
        </div>
      </section>
</body>
</html>
